repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - types-requests
          - types-pyyaml
          - typer
        args: [--config-file=pyproject.toml]
        files: ^src/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest-fast
        entry: python scripts/pytest-fast.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
